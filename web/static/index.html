<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosys — living system monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    --void:#060a10; --void2:#0a1119; --panel:rgba(12,18,27,.82);
    --hair:rgba(120,150,185,.14); --hair-bright:rgba(140,180,215,.4);
    --ink:#7f90a6; --ink-dim:#4a566a; --ink-bright:#e8f0f8;
    --run:#5ef2a8; --sleep:#4aa8ff; --idle:#7b8698; --dead:#ff6f5e; --deep:#37d2c8;
    --sel:#57f2d6; --heat:#ffcf7a;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--void);
            font-family:var(--mono);color:var(--ink);
            -webkit-font-smoothing:antialiased}
  #app{display:grid;grid-template-columns:320px 1fr;height:100%}

  /* ---------- rail instrument ---------- */
  #rail{border-right:1px solid var(--hair);display:flex;flex-direction:column;
        background:linear-gradient(180deg,var(--void2),var(--void));min-height:0}
  .head{padding:18px 18px 14px;border-bottom:1px solid var(--hair)}
  .brand{font-size:12px;font-weight:600;letter-spacing:.34em;color:var(--sel);
         text-transform:uppercase;display:flex;align-items:center;gap:9px}
  .brand .dot{width:6px;height:6px;border-radius:50%;background:var(--sel);
              box-shadow:0 0 10px var(--sel);animation:beat 2.4s ease-in-out infinite}
  @keyframes beat{0%,100%{opacity:.35}50%{opacity:1}}
  .sub{margin-top:5px;font-size:10px;letter-spacing:.18em;color:var(--ink-dim);
       text-transform:uppercase}

  .vitals{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hair);
          border-bottom:1px solid var(--hair)}
  .vital{background:var(--void2);padding:12px 16px}
  .vital .n{font-size:20px;color:var(--ink-bright);font-weight:500;line-height:1}
  .vital .l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
            color:var(--ink-dim);margin-top:5px}
  .states{display:flex;gap:14px;padding:10px 16px;border-bottom:1px solid var(--hair);
          font-size:10.5px;flex-wrap:wrap}
  .states span{display:inline-flex;align-items:center;gap:5px}
  .states i{width:7px;height:7px;border-radius:50%;display:inline-block}

  .tools{padding:12px 16px 8px;display:flex;flex-direction:column;gap:9px}
  #search{width:100%;background:var(--void);border:1px solid var(--hair);
          border-radius:4px;padding:7px 10px;color:var(--ink-bright);
          font-family:var(--mono);font-size:12px;outline:none}
  #search:focus{border-color:var(--hair-bright)}
  #search::placeholder{color:var(--ink-dim)}
  .sort{display:flex;gap:6px;font-size:10px}
  .sort button{flex:1;background:transparent;border:1px solid var(--hair);color:var(--ink);
               border-radius:4px;padding:5px;cursor:pointer;font-family:var(--mono);
               letter-spacing:.1em;text-transform:uppercase}
  .sort button.on{border-color:var(--sel);color:var(--sel)}

  #list{flex:1;overflow-y:auto;min-height:0;padding:4px 8px 16px}
  #list::-webkit-scrollbar{width:8px}
  #list::-webkit-scrollbar-thumb{background:var(--hair);border-radius:4px}
  .proc{display:grid;grid-template-columns:9px 1fr auto;gap:8px;align-items:center;
        padding:6px 8px;border-radius:5px;cursor:pointer;position:relative}
  .proc:hover{background:rgba(255,255,255,.03)}
  .proc.sel{background:rgba(87,242,214,.09);box-shadow:inset 2px 0 0 var(--sel)}
  .proc.dim{opacity:.28}
  .proc .tag{width:7px;height:7px;border-radius:50%}
  .proc .nm{font-size:11.5px;color:var(--ink-bright);white-space:nowrap;overflow:hidden;
            text-overflow:ellipsis}
  .proc .nm small{color:var(--ink-dim);font-size:10px}
  .proc .mem{font-size:11px;color:var(--ink);text-align:right;white-space:nowrap}
  .proc .bar{grid-column:2/4;height:2px;background:var(--hair);border-radius:2px;overflow:hidden}
  .proc .bar i{display:block;height:100%;border-radius:2px}

  /* ---------- scène ---------- */
  #scene{position:relative;min-width:0;overflow:hidden}
  #cv{display:block;width:100%;height:100%}
  #hint{position:absolute;right:16px;bottom:14px;font-size:10px;letter-spacing:.12em;
        text-transform:uppercase;color:var(--ink-dim);pointer-events:none}
  #legendCpu{position:absolute;left:16px;bottom:14px;font-size:10px;color:var(--ink-dim);
             letter-spacing:.1em;pointer-events:none}

  /* ---------- fiche ---------- */
  #card{position:absolute;top:16px;right:16px;width:288px;background:var(--panel);
        border:1px solid var(--hair);border-radius:6px;backdrop-filter:blur(8px);
        display:none;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  #card .ch{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;
            border-bottom:1px solid var(--hair)}
  #card .ch h3{margin:0;font-size:13px;color:var(--ink-bright);font-weight:600;
               white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #card .ch .x{cursor:pointer;color:var(--ink-dim);font-size:13px;padding-left:8px}
  #card .cb{padding:12px 14px}
  #card .kv{display:flex;justify-content:space-between;margin:6px 0;font-size:11.5px}
  #card .kv .k{color:var(--ink-dim);letter-spacing:.05em}
  #card .kv .v{color:var(--ink-bright)}
  #card .cmd{margin-top:10px;padding:8px 10px;background:var(--void);border-radius:4px;
             font-size:10.5px;color:var(--ink);word-break:break-all;line-height:1.5;
             max-height:76px;overflow:auto;border:1px solid var(--hair)}
  #card .act{padding:10px 14px 14px}
  #kill{width:100%;padding:8px;border-radius:4px;cursor:pointer;font-family:var(--mono);
        font-size:11px;letter-spacing:.14em;text-transform:uppercase;
        background:transparent;border:1px solid rgba(255,111,94,.4);color:var(--dead)}
  #kill:hover{background:rgba(255,111,94,.1)}
  #kill.confirm{background:var(--dead);color:#1a0a08;border-color:var(--dead);font-weight:600}

  #tip{position:absolute;display:none;pointer-events:none;font-size:11px;
       background:var(--panel);border:1px solid var(--hair);border-radius:4px;
       padding:4px 9px;color:var(--ink-bright);backdrop-filter:blur(4px);white-space:nowrap}
  @media (prefers-reduced-motion: reduce){ .brand .dot{animation:none} }
</style>
</head>
<body>
<div id="app">
  <aside id="rail">
    <div class="head">
      <div class="brand"><span class="dot"></span>Ecosys</div>
      <div class="sub" id="sub">living system monitor</div>
    </div>
    <div class="vitals">
      <div class="vital"><div class="n" id="vProc">0</div><div class="l">processes</div></div>
      <div class="vital"><div class="n" id="vMem">0</div><div class="l">memory</div></div>
    </div>
    <div class="states" id="states"></div>
    <div class="tools">
      <input id="search" placeholder="filter by name…" autocomplete="off" spellcheck="false">
      <div class="sort">
        <button data-sort="mem" class="on">memory</button>
        <button data-sort="cpu">cpu</button>
        <button data-sort="name">name</button>
      </div>
    </div>
    <div id="list"></div>
  </aside>

  <main id="scene">
    <canvas id="cv"></canvas>
    <div id="legendCpu">◍ size = memory · glow = cpu · hue = state</div>
    <div id="hint">click a cell · trace its lineage</div>
    <div id="card">
      <div class="ch"><h3 id="cName">—</h3><span class="x" id="cClose">✕</span></div>
      <div class="cb" id="cBody"></div>
      <div class="act" id="cAct"></div>
    </div>
    <div id="tip"></div>
  </main>
</div>

<script>
'use strict';
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){ const r=cv.parentElement.getBoundingClientRect();
  W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  computeLayout(); }

// ---------- couleurs d'état ----------
const STATE={ running:'#5ef2a8', sleeping:'#4aa8ff', idle:'#7b8698',
  'deep-sleep':'#37d2c8', zombie:'#ff6f5e', stopped:'#ffa14a', unknown:'#7b8698',
  // biomes de la simulation
  grasslands:'#6ee7a8', shoreline:'#4aa8ff', desert:'#ffcf7a' };
function stateColor(z){ return STATE[z]||'#7b8698'; }

// ---------- état ----------
const nodes=new Map();           // id -> node
let edges=[];                    // {from,to} lineage
let mode='—', canKill=false;
let sel=null, hover=null, sortKey='mem', query='';
const childrenOf=new Map(), parentOf=new Map();

// init taille du canvas maintenant que l'état est déclaré (computeLayout y accède)
new ResizeObserver(resize).observe(document.getElementById('scene')); resize();

function hashStr(s){let h=2166136261;for(const c of String(s)){h^=c.codePointAt(0);h=Math.imul(h,16777619);}return h>>>0;}

// ---------- polling ----------
async function poll(){
  try{
    const s=await (await fetch('/state')).json();
    if(!s.organisms) return;
    mode=s.mode; canKill=s.canKill;
    document.getElementById('sub').textContent =
      mode==='observation' ? 'this machine · '+s.population+' processes' : 'sandbox simulation';

    const seen=new Set();
    for(const o of s.organisms){
      seen.add(o.id);
      let n=nodes.get(o.id);
      if(!n){
        const seed=hashStr(o.id), ang=(seed%628)/100, rad=40+((seed>>3)%120);
        n={ id:o.id, x:W/2+Math.cos(ang)*rad, y:H/2+Math.sin(ang)*rad, vx:0, vy:0,
            r:6, tr:6, alpha:0, dying:0 };
        nodes.set(o.id,n);
      }
      n.name=o.name; n.cmd=o.command||o.name; n.state=o.zone; n.mem=o.energy;
      n.cpu=o.cpu||0; n.threads=o.threads||0; n.ppid=o.ppid||0; n.max=o.max||1;
      n.tr=Math.min(58, 5+Math.sqrt(Math.max(n.mem,0))*1.75);
      n.dying=0;
    }
    for(const n of nodes.values()) if(!seen.has(n.id) && !n.dying) n.dying=0.0001;

    edges=(s.relations||[]).filter(r=>r.type==='lineage').map(r=>({from:r.from,to:r.to}));
    childrenOf.clear(); parentOf.clear();
    for(const e of edges){
      if(!childrenOf.has(e.from)) childrenOf.set(e.from,[]);
      childrenOf.get(e.from).push(e.to); parentOf.set(e.to,e.from);
    }
    computeLayout(); renderVitals(s); renderList();
  }catch(e){/* attend le serveur */}
}
setInterval(poll,1000); poll();

// ---------- vitals + liste ----------
function fmtMem(mib){ return mib>=1024 ? (mib/1024).toFixed(1)+' GB' : Math.round(mib)+' MB'; }
function renderVitals(s){
  const live=[...nodes.values()].filter(n=>!n.dying);
  const totMem=live.reduce((a,n)=>a+n.mem,0);
  document.getElementById('vProc').textContent=live.length;
  document.getElementById('vMem').textContent=fmtMem(totMem);
  const counts={};
  for(const n of live) counts[n.state]=(counts[n.state]||0)+1;
  const order=['running','sleeping','idle','deep-sleep','zombie','stopped'];
  document.getElementById('states').innerHTML=order.filter(k=>counts[k])
    .map(k=>`<span><i style="background:${stateColor(k)}"></i>${k.replace('-',' ')} ${counts[k]}</span>`).join('');
}
function lineageSet(id){
  const set=new Set(); if(id==null) return set;
  set.add(id);
  let p=parentOf.get(id); while(p!=null){ set.add(p); p=parentOf.get(p); }
  const stack=[id]; while(stack.length){ const c=stack.pop();
    for(const k of (childrenOf.get(c)||[])){ if(!set.has(k)){ set.add(k); stack.push(k);} } }
  return set;
}
function renderList(){
  const live=[...nodes.values()].filter(n=>!n.dying);
  const q=query.trim().toLowerCase();
  live.sort((a,b)=> sortKey==='name' ? a.name.localeCompare(b.name)
                  : sortKey==='cpu' ? b.cpu-a.cpu : b.mem-a.mem);
  const lin = sel!=null ? lineageSet(sel) : null;
  const maxMem=Math.max(1,...live.map(n=>n.mem));
  const el=document.getElementById('list'); el.innerHTML='';
  for(const n of live){
    const match = !q || n.name.toLowerCase().includes(q);
    const row=document.createElement('div');
    row.className='proc'+(n.id===sel?' sel':'')+((!match||(lin&&!lin.has(n.id)))?' dim':'');
    row.innerHTML=
      `<span class="tag" style="background:${stateColor(n.state)}"></span>`+
      `<span class="nm">${n.name} <small>${n.cpu>=1?Math.round(n.cpu)+'%':''}</small></span>`+
      `<span class="mem">${fmtMem(n.mem)}</span>`+
      `<span class="bar"><i style="width:${Math.max(3,100*n.mem/maxMem)}%;background:${stateColor(n.state)}"></i></span>`;
    row.onmouseenter=()=>hover=n.id; row.onmouseleave=()=>hover=null;
    row.onclick=()=>select(n.id);
    el.appendChild(row);
  }
}
document.getElementById('search').addEventListener('input',e=>{query=e.target.value;renderList();});
document.querySelectorAll('.sort button').forEach(b=>b.onclick=()=>{
  sortKey=b.dataset.sort; document.querySelectorAll('.sort button').forEach(x=>x.classList.toggle('on',x===b));
  renderList();
});

// ---------- arbre radial : mise en page déterministe (aérée par construction) ----------
let ringGap=80;
function computeLayout(){
  const live=[...nodes.values()].filter(n=>!n.dying);
  if(!live.length) return;
  const inSet=new Set(live.map(n=>n.id));
  const kids=id=>(childrenOf.get(id)||[]).filter(c=>inSet.has(c));
  const roots=live.filter(n=>!(parentOf.has(n.id)&&inSet.has(parentOf.get(n.id))))
                  .sort((a,b)=>b.mem-a.mem);
  // profondeur (BFS) — racines au rayon 1, centre laissé vide
  const depth=new Map(); let maxDepth=1;
  const q=[]; for(const r of roots){ depth.set(r.id,1); q.push(r.id); }
  while(q.length){ const id=q.shift(), d=depth.get(id); maxDepth=Math.max(maxDepth,d);
    for(const c of kids(id)) if(!depth.has(c)){ depth.set(c,d+1); q.push(c); } }
  // poids = nombre de feuilles (pour répartir l'angle)
  const weight=new Map();
  const leaves=id=>{ const ch=kids(id); if(!ch.length){weight.set(id,1);return 1;}
    let s=0; for(const c of ch) s+=leaves(c); weight.set(id,s); return s; };
  let total=0; for(const r of roots) total+=leaves(r.id); total=Math.max(total,1);

  const cx=W/2, cy=H/2, avail=Math.min(W,H)*0.40;
  ringGap=avail/maxDepth;
  const cap=Math.max(5,ringGap*0.32);
  const place=(id,a0,a1)=>{
    const n=nodes.get(id); if(!n) return;
    const mid=(a0+a1)/2, d=depth.get(id)||1;
    n.depth=d; n.tx=cx+Math.cos(mid)*d*ringGap; n.ty=cy+Math.sin(mid)*d*ringGap;
    n.tr=Math.min(cap, n.tr);
    const ch=kids(id); let a=a0; const nc=ch.length;
    for(const c of ch){
      // mélange 50% proportionnel aux feuilles / 50% équitable :
      // les gros sous-arbres gardent l'avantage, les petits respirent.
      const frac=0.5*(weight.get(c)/weight.get(id)) + 0.5/nc;
      const span=(a1-a0)*frac; place(c,a,a+span); a+=span;
    }
  };
  let a=-Math.PI/2; const nr=Math.max(roots.length,1);
  for(const r of roots){
    const frac=0.5*(weight.get(r.id)/total) + 0.5/nr;
    const span=2*Math.PI*frac; place(r.id,a,a+span); a+=span;
  }
}

function update(dt,t){
  for(const n of [...nodes.values()]){
    if(n.dying){ n.dying+=dt*1.6; if(n.dying>=1){ nodes.delete(n.id); continue; } }
    n.alpha+=((n.dying?0:1)-n.alpha)*0.12;
    n.r+=(n.tr-n.r)*0.1;
    if(n.tx!=null){
      const bob=n.depth?Math.sin(t*0.7+n.id)*0.8:0;   // léger souffle vivant
      n.x+=(n.tx-n.x)*0.12; n.y+=(n.ty+bob-n.y)*0.12;
    }
  }
}

// branche radiale : courbe qui part du parent le long de l'angle de l'enfant
function drawBranch(a,b,style,w){
  const cx=W/2, cy=H/2;
  const par=(a.depth||1)<=(b.depth||1)?a:b, chi=par===a?b:a;
  const rp=Math.hypot(par.x-cx,par.y-cy), ang=Math.atan2(chi.y-cy,chi.x-cx);
  ctx.beginPath(); ctx.moveTo(par.x,par.y);
  ctx.quadraticCurveTo(cx+Math.cos(ang)*rp, cy+Math.sin(ang)*rp, chi.x,chi.y);
  ctx.strokeStyle=style; ctx.lineWidth=w; ctx.stroke();
}

// ---------- rendu ----------
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now; const t=now/1000;
  update(dt,t);
  ctx.clearRect(0,0,W,H);
  // fond
  const bg=ctx.createRadialGradient(W/2,H*0.42,0,W/2,H*0.42,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#0a1119'); bg.addColorStop(1,'#05070c');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // cœur du système au centre (racine de l'arbre) + anneaux de profondeur
  if(nodes.size){
    ctx.save();
    for(let d=1; d*ringGap<Math.min(W,H)*0.5; d++){
      ctx.beginPath(); ctx.arc(W/2,H/2,d*ringGap,0,7);
      ctx.strokeStyle='rgba(120,150,185,.045)'; ctx.lineWidth=1; ctx.stroke();
    }
    const core=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,26);
    core.addColorStop(0,'rgba(87,242,214,.5)'); core.addColorStop(1,'rgba(87,242,214,0)');
    ctx.fillStyle=core; ctx.beginPath(); ctx.arc(W/2,H/2,26,0,7); ctx.fill();
    ctx.restore();
  }

  const lin = sel!=null ? lineageSet(sel) : null;
  const q=query.trim().toLowerCase();
  const isLit=n=> (!lin||lin.has(n.id)) && (!q||n.name.toLowerCase().includes(q));

  // branches de base : veines bioluminescentes toujours visibles, teintées par
  // l'état des deux processus qu'elles relient (rendu additif -> réseau vivant)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const e of edges){
    const a=nodes.get(e.from), b=nodes.get(e.to); if(!a||!b) continue;
    if(lin && lin.has(a.id) && lin.has(b.id)) continue;   // lignée : dessinée par-dessus
    const base = lin ? 0.10 : 0.34;                       // reste esquissé même hors lignée
    const shimmer = base * (0.85 + 0.15*Math.sin(t*1.4 + a.id));
    const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, hexA(stateColor(a.state), shimmer));
    grad.addColorStop(0.5, hexA(mix(stateColor(a.state), stateColor(b.state), 0.5), shimmer*0.7));
    grad.addColorStop(1, hexA(stateColor(b.state), shimmer));
    drawBranch(a, b, grad, 1.3);
  }
  ctx.restore();

  // nœuds
  for(const n of nodes.values()){
    const lit=isLit(n); const a=n.alpha*(lit?1:0.16);
    if(a<=0.01) continue;
    const col=stateColor(n.state);
    const cpuF=Math.min(n.cpu/100,2)/2;                 // 0..1
    const pulse=1+ (0.03+cpuF*0.08)*Math.sin(t*(2+cpuF*4)+n.id);
    const r=n.r*pulse, gr=r*(1.9+cpuF*1.4);
    // halo
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,gr);
    g.addColorStop(0,hexA(col,(0.5+cpuF*0.4)*a));
    g.addColorStop(0.4,hexA(col,(0.18+cpuF*0.25)*a));
    g.addColorStop(1,hexA(col,0));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,gr,0,7); ctx.fill();
    // cœur
    const core=ctx.createRadialGradient(n.x-r*0.3,n.y-r*0.3,0,n.x,n.y,r);
    core.addColorStop(0,hexA(mix(col,'#ffffff',0.5),a));
    core.addColorStop(1,hexA(col,a));
    ctx.fillStyle=core; ctx.beginPath(); ctx.arc(n.x,n.y,r,0,7); ctx.fill();
    // sélection / survol
    if(n.id===sel||n.id===hover){
      ctx.strokeStyle=hexA('#57f2d6',0.9); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(n.x,n.y,r+4,0,7); ctx.stroke();
    }
    // label pour gros nœuds / sélection / survol
    if(r>16||n.id===sel||n.id===hover){
      ctx.font='11px "IBM Plex Mono",monospace'; ctx.textAlign='center';
      ctx.fillStyle=hexA('#e8f0f8',Math.min(1,a+0.2));
      ctx.fillText(n.name, n.x, n.y+r+13);
    }
  }

  // branches de lignée (par-dessus les nœuds) : fils bioluminescents cyan
  if(lin){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.shadowColor='#57f2d6'; ctx.shadowBlur=11;
    for(const e of edges){
      const a=nodes.get(e.from), b=nodes.get(e.to); if(!a||!b) continue;
      if(!(lin.has(a.id)&&lin.has(b.id))) continue;
      drawBranch(a,b,'rgba(87,242,214,.9)',2.2);
    }
    ctx.restore();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// helpers couleur
function hexA(hex,a){ const h=hex.replace('#',''); const r=parseInt(h.substr(0,2),16),
  g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a))})`; }
function mix(h1,h2,t){ const p=x=>[parseInt(x.substr(1,2),16),parseInt(x.substr(3,2),16),parseInt(x.substr(5,2),16)];
  const a=p(h1),b=p(h2); const c=a.map((v,i)=>Math.round(v+(b[i]-v)*t));
  return '#'+c.map(v=>v.toString(16).padStart(2,'0')).join(''); }

// ---------- interaction ----------
function nodeAt(px,py){ let best=null,bd=1e9;
  for(const n of nodes.values()){ if(n.dying) continue; const d=Math.hypot(n.x-px,n.y-py);
    if(d<n.r+6 && d<bd){ bd=d; best=n; } } return best; }
const tip=document.getElementById('tip');
cv.addEventListener('mousemove',e=>{ const r=cv.getBoundingClientRect();
  const n=nodeAt(e.clientX-r.left,e.clientY-r.top); hover=n?n.id:null;
  if(n){ tip.style.display='block'; tip.style.left=(e.clientX-r.left+14)+'px';
    tip.style.top=(e.clientY-r.top+10)+'px';
    tip.textContent=`${n.name} · ${fmtMem(n.mem)} · ${Math.round(n.cpu)}%`;
    cv.style.cursor='pointer'; } else { tip.style.display='none'; cv.style.cursor='default'; } });
cv.addEventListener('mouseleave',()=>{hover=null;tip.style.display='none';});
cv.addEventListener('click',e=>{ const r=cv.getBoundingClientRect();
  const n=nodeAt(e.clientX-r.left,e.clientY-r.top); select(n?n.id:null); });

function select(id){ sel=id; renderList(); renderCard(); }
document.getElementById('cClose').onclick=()=>select(null);

function kv(k,v){ return `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`; }
function renderCard(){
  const card=document.getElementById('card');
  if(sel==null || !nodes.get(sel)){ card.style.display='none'; return; }
  const n=nodes.get(sel);
  document.getElementById('cName').textContent=n.name;
  const parent=nodes.get(n.ppid);
  const kids=(childrenOf.get(n.id)||[]).length;
  document.getElementById('cBody').innerHTML=
      kv(mode==='observation'?'pid':'id', n.id)
    + (mode==='observation'?kv('parent', parent?`${parent.name} · ${n.ppid}`:n.ppid):'')
    + kv('state', n.state)
    + kv('memory', fmtMem(n.mem))
    + (mode==='observation'?kv('cpu', n.cpu.toFixed(1)+' %'):kv('energy',n.mem.toFixed(1)))
    + (mode==='observation'?kv('threads', n.threads):'')
    + kv('children', kids)
    + (mode==='observation'?`<div class="cmd">${escapeHtml(n.cmd)}</div>`:'');
  const act=document.getElementById('cAct');
  if(canKill && mode==='observation'){
    act.innerHTML=`<button id="kill">terminate</button>`;
    const btn=document.getElementById('kill'); let armed=false, timer=null;
    btn.onclick=()=>{
      if(!armed){ armed=true; btn.classList.add('confirm'); btn.textContent='confirm — send SIGTERM';
        timer=setTimeout(()=>{armed=false;btn.classList.remove('confirm');btn.textContent='terminate';},3000); return; }
      clearTimeout(timer);
      fetch('/kill?pid='+n.id,{method:'POST'}).catch(()=>{});
      btn.textContent='signal sent'; btn.classList.remove('confirm');
    };
  } else act.innerHTML='';
  card.style.display='block';
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
setInterval(()=>{ if(sel!=null) renderCard(); },1000);
</script>
