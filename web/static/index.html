<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosys — living system monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    --void:#05090e; --void2:#081018; --glass:rgba(10,19,27,.74);
    --edge:rgba(96,190,205,.16); --edge-soft:rgba(96,190,205,.08);
    --glow:rgba(87,242,214,.35);
    --panel:var(--glass); --hair:var(--edge);
    --ink:#8496ac; --ink-dim:#495768; --ink-bright:#e9f3fa;
    --run:#5ef2a8; --sleep:#4aa8ff; --idle:#7b8698; --dead:#ff6f5e; --deep:#37d2c8;
    --sel:#57f2d6; --heat:#ffcf7a;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--void);
            font-family:var(--mono);color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{display:grid;grid-template-columns:322px 1fr;height:100%}

  /* ---------- console d'observation bio ---------- */
  #rail{position:relative;display:flex;flex-direction:column;min-height:0;
        border-right:1px solid var(--edge);
        background:
          radial-gradient(130% 45% at 0% 0%, rgba(92,72,175,.18), transparent 60%),
          linear-gradient(180deg,#0a0f24,#03040c);
        box-shadow:12px 0 40px -22px rgba(0,0,0,.9)}
  .head{padding:18px 18px 15px;border-bottom:1px solid var(--edge)}
  .brand{font-size:12px;font-weight:600;letter-spacing:.36em;color:var(--sel);
         text-transform:uppercase;display:flex;align-items:center;gap:9px;
         text-shadow:0 0 16px rgba(87,242,214,.45)}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--sel);
              box-shadow:0 0 12px var(--sel),0 0 4px var(--sel);
              animation:beat 2.6s ease-in-out infinite}
  @keyframes beat{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .sub{margin-top:6px;font-size:10px;letter-spacing:.16em;color:var(--ink-dim);text-transform:uppercase}

  .vitals{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--edge);
          border-bottom:1px solid var(--edge)}
  .vital{background:linear-gradient(180deg,rgba(12,22,30,.65),transparent);padding:13px 16px}
  .vital .n{font-size:21px;color:var(--ink-bright);font-weight:500;line-height:1;
            text-shadow:0 0 18px rgba(87,242,214,.28)}
  .vital .l{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-top:6px}
  .states{display:flex;gap:14px;padding:11px 16px;border-bottom:1px solid var(--edge);
          font-size:10.5px;flex-wrap:wrap}
  .states span{display:inline-flex;align-items:center;gap:6px}
  .states i{width:7px;height:7px;border-radius:50%;display:inline-block}

  .tools{padding:13px 16px 9px;display:flex;flex-direction:column;gap:10px}
  #search{width:100%;background:rgba(4,9,14,.7);border:1px solid var(--edge);
          border-radius:20px;padding:8px 14px;color:var(--ink-bright);
          font-family:var(--mono);font-size:12px;outline:none;transition:box-shadow .2s,border-color .2s}
  #search:focus{border-color:var(--sel);box-shadow:0 0 0 3px rgba(87,242,214,.1),0 0 18px -2px var(--glow)}
  #search::placeholder{color:var(--ink-dim)}
  .sort{display:flex;gap:6px;font-size:10px}
  .sort button{flex:1;background:transparent;border:1px solid var(--edge);color:var(--ink);
               border-radius:20px;padding:6px;cursor:pointer;font-family:var(--mono);
               letter-spacing:.12em;text-transform:uppercase;transition:.15s}
  .sort button:hover{color:var(--ink-bright)}
  .sort button.on{border-color:var(--sel);color:var(--sel);box-shadow:0 0 14px -3px var(--glow)}

  #list{flex:1;overflow-y:auto;min-height:0;padding:6px 8px 16px}
  #list::-webkit-scrollbar{width:8px}
  #list::-webkit-scrollbar-thumb{background:var(--edge);border-radius:4px}
  .proc{display:grid;grid-template-columns:10px 1fr auto;gap:9px;align-items:center;
        padding:7px 9px;border-radius:9px;cursor:pointer;position:relative;transition:background .15s}
  .proc:hover{background:rgba(87,242,214,.05)}
  .proc.sel{background:rgba(87,242,214,.1);box-shadow:inset 2px 0 0 var(--sel),0 0 22px -8px var(--glow)}
  .proc.dim{opacity:.26}
  .proc .tag{width:8px;height:8px;border-radius:50%}
  .proc .nm{font-size:11.5px;color:var(--ink-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .proc .nm small{color:var(--ink-dim);font-size:10px}
  .proc .mem{font-size:11px;color:var(--ink);text-align:right;white-space:nowrap}
  .proc .bar{grid-column:2/4;height:2px;background:var(--edge);border-radius:2px;overflow:hidden}
  .proc .bar i{display:block;height:100%;border-radius:2px}

  /* ---------- scène ---------- */
  #scene{position:relative;min-width:0;overflow:hidden}
  #cv{display:block;width:100%;height:100%}
  #hint{position:absolute;right:16px;bottom:14px;font-size:10px;letter-spacing:.12em;
        text-transform:uppercase;color:var(--ink-dim);pointer-events:none}
  #legendCpu{position:absolute;left:16px;bottom:14px;font-size:10px;color:var(--ink-dim);
             letter-spacing:.1em;pointer-events:none}
  #regroup{position:absolute;left:50%;bottom:13px;transform:translateX(-50%);display:none;
           z-index:6;cursor:pointer;font-size:10px;letter-spacing:.16em;text-transform:uppercase;
           color:var(--sel);border:1px solid var(--sel);border-radius:20px;padding:6px 16px;
           background:var(--glass);backdrop-filter:blur(6px);box-shadow:0 0 18px -5px var(--glow)}
  #regroup:hover{background:rgba(87,242,214,.12)}

  /* ---------- fiche spécimen ---------- */
  #card{position:absolute;top:16px;right:16px;width:290px;background:var(--glass);
        border:1px solid var(--edge);border-radius:12px;backdrop-filter:blur(11px);
        display:none;overflow:hidden;
        box-shadow:0 16px 50px rgba(0,0,0,.55), inset 0 0 44px -30px var(--glow)}
  #card .ch{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;
            border-bottom:1px solid var(--edge);
            background:linear-gradient(180deg,rgba(87,242,214,.07),transparent)}
  #card .ch h3{margin:0;font-size:13px;color:var(--sel);font-weight:600;
               white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
               text-shadow:0 0 12px rgba(87,242,214,.35)}
  #card .ch .x{cursor:pointer;color:var(--ink-dim);font-size:13px;padding-left:8px}
  #card .ch .x:hover{color:var(--ink-bright)}
  #card .cb{padding:13px 15px}
  #card .kv{display:flex;justify-content:space-between;margin:6px 0;font-size:11.5px}
  #card .kv .k{color:var(--ink-dim);letter-spacing:.05em}
  #card .kv .v{color:var(--ink-bright)}
  #card .cmd{margin-top:10px;padding:9px 11px;background:rgba(4,9,14,.7);border-radius:7px;
             font-size:10.5px;color:var(--ink);word-break:break-all;line-height:1.5;
             max-height:76px;overflow:auto;border:1px solid var(--edge)}
  #card .act{padding:10px 15px 15px}
  #kill{width:100%;padding:9px;border-radius:20px;cursor:pointer;font-family:var(--mono);
        font-size:11px;letter-spacing:.14em;text-transform:uppercase;
        background:transparent;border:1px solid rgba(255,111,94,.45);color:var(--dead);transition:.15s}
  #kill:hover{background:rgba(255,111,94,.12);box-shadow:0 0 18px -6px rgba(255,111,94,.6)}
  #kill.confirm{background:var(--dead);color:#1a0a08;border-color:var(--dead);font-weight:600}

  /* ---------- pouvoirs divins ---------- */
  #god{position:absolute;left:16px;bottom:40px;z-index:6;display:none;width:224px;
       background:var(--glass);border:1px solid var(--edge);border-radius:12px;
       backdrop-filter:blur(11px);padding:12px 13px;
       box-shadow:0 16px 50px rgba(0,0,0,.55), inset 0 0 44px -30px var(--glow)}
  #god .gh{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--heat);
           text-shadow:0 0 12px rgba(255,207,122,.4);margin-bottom:10px}
  #god .grow{display:flex;align-items:center;gap:5px;margin:6px 0;flex-wrap:wrap}
  #god .gl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);
           width:34px;flex:none}
  #god select{flex:1;background:rgba(4,9,14,.7);border:1px solid var(--edge);border-radius:8px;
              color:var(--ink-bright);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none}
  #god button{flex:1;min-width:52px;background:transparent;border:1px solid var(--edge);
              color:var(--ink);border-radius:8px;padding:5px 4px;cursor:pointer;
              font-family:var(--mono);font-size:10px;letter-spacing:.06em;transition:.15s}
  #god button:hover{border-color:var(--sel);color:var(--sel);box-shadow:0 0 12px -3px var(--glow)}
  #god button.danger{border-color:rgba(255,111,94,.4);color:var(--dead)}
  #god button.danger:hover{box-shadow:0 0 12px -3px rgba(255,111,94,.6)}
  #god button:active{transform:translateY(1px)}

  #tip{position:absolute;display:none;pointer-events:none;font-size:11px;
       background:var(--glass);border:1px solid var(--edge);border-radius:7px;
       padding:5px 10px;color:var(--ink-bright);backdrop-filter:blur(6px);white-space:nowrap;
       box-shadow:0 6px 20px rgba(0,0,0,.4)}
  @media (prefers-reduced-motion: reduce){ .brand .dot{animation:none} }
</style>
</head>
<body>
<div id="app">
  <aside id="rail">
    <div class="head">
      <div class="brand"><span class="dot"></span>Ecosys</div>
      <div class="sub" id="sub">living system monitor</div>
    </div>
    <div class="vitals">
      <div class="vital"><div class="n" id="vProc">0</div><div class="l">processes</div></div>
      <div class="vital"><div class="n" id="vMem">0</div><div class="l">memory</div></div>
    </div>
    <div class="states" id="states"></div>
    <div class="tools">
      <input id="search" placeholder="filter by name…" autocomplete="off" spellcheck="false">
      <div class="sort">
        <button data-sort="mem" class="on">memory</button>
        <button data-sort="cpu">cpu</button>
        <button data-sort="name">name</button>
      </div>
    </div>
    <div id="list"></div>
  </aside>

  <main id="scene">
    <canvas id="cv"></canvas>
    <div id="legendCpu">◍ size = memory · glow = cpu · hue = state</div>
    <div id="hint">scroll = zoom · drag = pan · dbl-click = reset · click a cell = lineage</div>
    <div id="regroup">⟲ regroup</div>
    <div id="card">
      <div class="ch"><h3 id="cName">—</h3><span class="x" id="cClose">✕</span></div>
      <div class="cb" id="cBody"></div>
      <div class="act" id="cAct"></div>
    </div>
    <div id="tip"></div>
    <div id="god">
      <div class="gh">☼ divine powers</div>
      <div class="grow"><span class="gl">zone</span><select id="godZone"></select></div>
      <div class="grow"><span class="gl">seed</span>
        <button data-seed="Grazer">Grazer</button>
        <button data-seed="Explorer">Explorer</button>
        <button data-seed="Predator">Predator</button></div>
      <div class="grow"><span class="gl">zone</span>
        <button data-act="bless">bless</button>
        <button data-act="curse">drain</button>
        <button data-act="smite" class="danger">smite</button></div>
      <div class="grow"><span class="gl">world</span>
        <button data-act="drought">drought</button>
        <button data-act="abundance">abundance</button></div>
    </div>
  </main>
</div>

<script>
'use strict';
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){ const r=cv.parentElement.getBoundingClientRect();
  W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  computeLayout(); }

// ---------- couleurs d'état ----------
const STATE={ running:'#5ef2a8', sleeping:'#4aa8ff', idle:'#7b8698',
  'deep-sleep':'#37d2c8', zombie:'#ff6f5e', stopped:'#ffa14a', unknown:'#7b8698',
  // biomes de la simulation
  grasslands:'#6ee7a8', shoreline:'#4aa8ff', desert:'#ffcf7a' };
function stateColor(z){ return STATE[z]||'#7b8698'; }

// En simulation, la couleur porte l'ESPÈCE (herbivore / éclaireur / prédateur),
// pas le biome : c'est ce qui distingue les créatures à l'œil. En observation,
// elle porte l'état du processus.
const SPECIES={ Grazer:'#6ee7a8', Explorer:'#5ad1ff', Predator:'#ff6f5e' };
function speciesColor(name){ return SPECIES[name] || '#c9a4ff'; }
function nodeColor(n){ return mode==='simulation' ? speciesColor(n.name) : stateColor(n.state); }
function rawColor(p){ return mode==='simulation' ? speciesColor(p.name) : stateColor(p.zone); }

// ---------- état ----------
const nodes=new Map();           // id -> node d'affichage (process ou groupe)
let edges=[];                    // {from,to} lignée (ids d'affichage)
let mode='—', canKill=false;
let sel=null, hover=null, sortKey='mem', query='';
let zoom=1, panX=0, panY=0;      // caméra : molette = zoom, glisser = pan
let autoFitted=false;            // cadrage auto de l'arbre au 1er affichage
let fitZoom=1, fitPanX=0, fitPanY=0;   // vue d'ensemble (double-clic y revient)
let maxOrbit=300;                      // rayon de la plus grande orbite
const childrenOf=new Map(), parentOf=new Map();

// données brutes (la liste montre TOUS les processus) + repli des fratries
let procs=[];
let procById=new Map();
let rawRelations=[];             // lignée : PPID (observation) ou reproduction (simulation)
const expanded=new Set();        // clés de groupes dépliés
const groupKeyToId=new Map();    // clé de groupe -> id négatif stable
const pidToGroupKey=new Map();   // pid replié -> clé de son groupe
let groupIdSeq=-1;               // ids de groupe : négatifs (jamais un pid)
const GROUP_MIN=6;               // taille min d'une fratrie homonyme pour replier

// init taille du canvas maintenant que l'état est déclaré (computeLayout y accède)
new ResizeObserver(resize).observe(document.getElementById('scene')); resize();

function hashStr(s){let h=2166136261;for(const c of String(s)){h^=c.codePointAt(0);h=Math.imul(h,16777619);}return h>>>0;}
// « famille » d'un nom : on retire l'identifiant d'instance (kworker/5:2 ->
// kworker, ksoftirqd/3 -> ksoftirqd) pour replier les essaims de threads noyau.
function family(name){ const s=String(name).split('/')[0].replace(/[-_.:]?\d+$/,''); return s||name; }

// ---------- polling ----------
async function poll(){
  try{
    const s=await (await fetch('/state')).json();
    if(!s.organisms) return;
    mode=s.mode; canKill=s.canKill;
    document.getElementById('sub').textContent =
      mode==='observation' ? 'this machine · '+s.population+' processes' : 'god game · shape the ecosystem';
    document.getElementById('god').style.display = mode==='simulation' ? 'block' : 'none';
    if(mode==='simulation') updateGodZones(s.zones.map(z=>z.name));

    procs=s.organisms;
    procById=new Map(procs.map(p=>[p.id,p]));
    rawRelations=(s.relations||[]).filter(r=>r.type==='lineage');
    buildDisplay();
    computeLayout(); renderVitals(); renderList();
  }catch(e){/* attend le serveur */}
}
setInterval(poll,1000); poll();

// Construit le graphe AFFICHÉ à partir des processus bruts : les fratries
// homonymes de >= GROUP_MIN membres sous un même parent sont repliées en un
// seul nœud « nom ×N » (sauf si dépliées). La liste, elle, reste complète.
function buildDisplay(){
  pidToGroupKey.clear();
  const isObs = mode==='observation';
  // parent de chaque nœud : la lignée (PPID en obs, reproduction en sim)
  const relParent=new Map();
  for(const r of rawRelations) relParent.set(r.to,r.from);
  const parOf=new Map();
  for(const p of procs) parOf.set(p.id, relParent.has(p.id)?relParent.get(p.id):(isObs?p.ppid:0));

  const childrenByParent=new Map();
  for(const p of procs){ const par=parOf.get(p.id);
    if(!childrenByParent.has(par)) childrenByParent.set(par,[]);
    childrenByParent.get(par).push(p); }

  const hidden=new Set(), groups=[];
  if(isObs){   // le repli des colonies ne concerne que les processus réels
    for(const [par,ch] of childrenByParent){
      const byFam=new Map();
      for(const c of ch){ const f=family(c.name); if(!byFam.has(f)) byFam.set(f,[]); byFam.get(f).push(c); }
      for(const [fam,members] of byFam){
        const key=par+'|'+fam;
        if(members.length>=GROUP_MIN && !expanded.has(key)){
          let mem=0,cpu=0,threads=0; const stc={};
          for(const m of members){ mem+=m.energy; cpu+=(m.cpu||0); threads+=(m.threads||0);
            stc[m.zone]=(stc[m.zone]||0)+1; hidden.add(m.id); pidToGroupKey.set(m.id,key); }
          let state='sleeping',bb=-1; for(const k in stc) if(stc[k]>bb){bb=stc[k];state=k;}
          groups.push({key,par,name:fam,count:members.length,mem,cpu,threads,state});
        }
      }
    }
    let changed=true;
    while(changed){ changed=false;
      for(const p of procs) if(!hidden.has(p.id)&&hidden.has(parOf.get(p.id))){ hidden.add(p.id); changed=true; } }
  }

  const specs=[];
  for(const p of procs){ if(hidden.has(p.id)) continue;
    specs.push({id:p.id,name:p.name,state:p.zone,mem:p.energy,cpu:p.cpu||0,threads:p.threads||0,
      ppid:p.ppid,cmd:p.command||p.name,max:p.max||1,isGroup:false}); }
  for(const g of groups){
    let gid=groupKeyToId.get(g.key); if(gid==null){ gid=groupIdSeq--; groupKeyToId.set(g.key,gid); }
    specs.push({id:gid,name:g.name,state:g.state,mem:g.mem,cpu:g.cpu,threads:g.threads,
      ppid:g.par,isGroup:true,count:g.count,groupKey:g.key,cmd:''}); }

  const visible=new Set(specs.filter(s=>!s.isGroup).map(s=>s.id));
  const dedges=[];
  for(const p of procs){ if(!visible.has(p.id)) continue; const par=parOf.get(p.id);
    if(visible.has(par)) dedges.push({from:par,to:p.id}); }
  for(const g of groups) dedges.push({from:g.par,to:groupKeyToId.get(g.key)});

  const seen=new Set();
  for(const s of specs){ seen.add(s.id);
    let n=nodes.get(s.id);
    if(!n){ const seed=hashStr(s.id), ang=(Math.abs(seed)%628)/100, rad=40+((Math.abs(seed)>>3)%120);
      n={id:s.id,x:W/2+Math.cos(ang)*rad,y:H/2+Math.sin(ang)*rad,r:6,tr:6,alpha:0,dying:0}; nodes.set(s.id,n); }
    Object.assign(n,{name:s.name,cmd:s.cmd,state:s.state,mem:s.mem,cpu:s.cpu,threads:s.threads,
      ppid:s.ppid,isGroup:s.isGroup,count:s.count||0,groupKey:s.groupKey,max:s.max||1});
    n.tr=Math.min(42, 5+Math.sqrt(Math.max(n.mem,0))*1.45);
    n.dying=0;
  }
  for(const n of nodes.values()) if(!seen.has(n.id) && !n.dying) n.dying=0.0001;

  edges=dedges;
  childrenOf.clear(); parentOf.clear();
  for(const e of edges){ if(!childrenOf.has(e.from)) childrenOf.set(e.from,[]);
    childrenOf.get(e.from).push(e.to); parentOf.set(e.to,e.from); }
}

function toggleGroup(key){ if(!key) return;
  if(expanded.has(key)) expanded.delete(key); else expanded.add(key);
  buildDisplay(); computeLayout();
  document.getElementById('regroup').style.display = expanded.size?'block':'none';
}

// ---------- vitals + liste ----------
function fmtMem(mib){ return mib>=1024 ? (mib/1024).toFixed(1)+' GB' : Math.round(mib)+' MB'; }
function renderVitals(){
  const totMem=procs.reduce((a,p)=>a+p.energy,0);
  document.getElementById('vProc').textContent=procs.length;
  document.getElementById('vMem').textContent=fmtMem(totMem);
  if(mode==='simulation'){
    // légende par ESPÈCE : c'est la clé de lecture de l'écosystème
    const counts={};
    for(const p of procs) counts[p.name]=(counts[p.name]||0)+1;
    const order=['Grazer','Explorer','Predator'];
    document.getElementById('states').innerHTML=order.filter(k=>counts[k])
      .map(k=>`<span><i style="background:${speciesColor(k)};box-shadow:0 0 7px ${speciesColor(k)}"></i>${k} ${counts[k]}</span>`).join('');
  } else {
    const counts={};
    for(const p of procs) counts[p.zone]=(counts[p.zone]||0)+1;
    const order=['running','sleeping','idle','deep-sleep','zombie','stopped'];
    document.getElementById('states').innerHTML=order.filter(k=>counts[k])
      .map(k=>`<span><i style="background:${stateColor(k)};box-shadow:0 0 7px ${stateColor(k)}"></i>${k.replace('-',' ')} ${counts[k]}</span>`).join('');
  }
}
function lineageSet(id){
  const set=new Set(); if(id==null) return set;
  set.add(id);
  let p=parentOf.get(id); while(p!=null){ set.add(p); p=parentOf.get(p); }
  const stack=[id]; while(stack.length){ const c=stack.pop();
    for(const k of (childrenOf.get(c)||[])){ if(!set.has(k)){ set.add(k); stack.push(k);} } }
  return set;
}
function renderList(){
  const q=query.trim().toLowerCase();
  const list=procs.slice().sort((a,b)=> sortKey==='name' ? a.name.localeCompare(b.name)
                  : sortKey==='cpu' ? (b.cpu||0)-(a.cpu||0) : b.energy-a.energy);
  const lin = sel!=null ? lineageSet(sel) : null;
  const maxMem=Math.max(1,...list.map(p=>p.energy));
  const el=document.getElementById('list'); el.innerHTML='';
  for(const p of list){
    const match = !q || p.name.toLowerCase().includes(q);
    let inLin=true;
    if(lin){ const gk=pidToGroupKey.get(p.id), gid=gk?groupKeyToId.get(gk):null;
      inLin = lin.has(p.id) || (gid!=null && lin.has(gid)); }
    const row=document.createElement('div');
    row.className='proc'+(p.id===sel?' sel':'')+((!match||!inLin)?' dim':'');
    row.innerHTML=
      `<span class="tag" style="background:${rawColor(p)};box-shadow:0 0 7px ${rawColor(p)}"></span>`+
      `<span class="nm">${p.name} <small>${(p.cpu||0)>=1?Math.round(p.cpu)+'%':''}</small></span>`+
      `<span class="mem">${fmtMem(p.energy)}</span>`+
      `<span class="bar"><i style="width:${Math.max(3,100*p.energy/maxMem)}%;background:${rawColor(p)};box-shadow:0 0 6px ${rawColor(p)}"></i></span>`;
    row.onmouseenter=()=>hover=p.id; row.onmouseleave=()=>hover=null;
    row.onclick=()=>select(p.id);
    el.appendChild(row);
  }
}

// ---------- arbre radial : mise en page déterministe (aérée par construction) ----------
let ringGap=80;
function computeLayout(){
  const live=[...nodes.values()].filter(n=>!n.dying);
  if(!live.length) return;
  const inSet=new Set(live.map(n=>n.id));
  const kids=id=>(childrenOf.get(id)||[]).filter(c=>inSet.has(c));
  const roots=live.filter(n=>!(parentOf.has(n.id)&&inSet.has(parentOf.get(n.id))))
                  .sort((a,b)=>b.mem-a.mem);
  // profondeur (BFS) — racines au rayon 1, centre laissé vide
  const depth=new Map(); let maxDepth=1;
  const q=[]; for(const r of roots){ depth.set(r.id,1); q.push(r.id); }
  while(q.length){ const id=q.shift(), d=depth.get(id); maxDepth=Math.max(maxDepth,d);
    for(const c of kids(id)) if(!depth.has(c)){ depth.set(c,d+1); q.push(c); } }
  // poids = nombre de feuilles (pour répartir l'angle)
  const weight=new Map();
  const leaves=id=>{ const ch=kids(id); if(!ch.length){weight.set(id,1);return 1;}
    let s=0; for(const c of ch) s+=leaves(c); weight.set(id,s); return s; };
  let total=0; for(const r of roots) total+=leaves(r.id); total=Math.max(total,1);

  const cx=W/2, cy=H/2;
  // espacement adaptatif : chaque anneau doit offrir assez de circonférence
  // pour ses occupants (sinon ça se chevauche). L'arbre peut dépasser l'écran
  // -> on dé-zoome pour le cadrer, et on explore à la molette.
  // On dimensionne chaque orbite pour que la somme des diamètres des astres
  // qu'elle porte tienne dans sa circonférence -> ils ne se touchent pas.
  const cap=42, gap=22;
  const sumByDepth=new Map();
  for(const n of live){ const d=depth.get(n.id)||1;
    sumByDepth.set(d,(sumByDepth.get(d)||0) + 2*Math.min(n.tr,cap) + gap); }
  ringGap=2*cap+18;                    // plancher : pas de collision entre anneaux
  for(const [d,sum] of sumByDepth){
    const need=sum/(2*Math.PI*Math.max(d,1));
    if(need>ringGap) ringGap=need;
  }
  const place=(id,a0,a1)=>{
    const n=nodes.get(id); if(!n) return;
    const mid=(a0+a1)/2, d=depth.get(id)||1;
    n.depth=d; n.baseAngle=mid; n.orbitR=d*ringGap;   // orbite : angle + rayon
    n.tr=Math.min(cap, n.tr);
    const ch=kids(id); let a=a0; const nc=ch.length;
    for(const c of ch){
      // mélange 50% proportionnel aux feuilles / 50% équitable :
      // les gros sous-arbres gardent l'avantage, les petits respirent.
      const frac=0.5*(weight.get(c)/weight.get(id)) + 0.5/nc;
      const span=(a1-a0)*frac; place(c,a,a+span); a+=span;
    }
  };
  let a=-Math.PI/2; const nr=Math.max(roots.length,1);
  for(const r of roots){
    const frac=0.5*(weight.get(r.id)/total) + 0.5/nr;
    const span=2*Math.PI*frac; place(r.id,a,a+span); a+=span;
  }

  // relaxation angulaire : on écarte deux astres trop proches sur une orbite
  const byDepth=new Map();
  for(const n of live){ if(n.baseAngle==null) continue;
    if(!byDepth.has(n.depth)) byDepth.set(n.depth,[]);
    byDepth.get(n.depth).push(n); }
  for(const [d,arr] of byDepth){
    if(arr.length<2) continue;
    const R=Math.max(d*ringGap,1);
    arr.sort((x,y)=>x.baseAngle-y.baseAngle);
    for(let it=0; it<9; it++){
      for(let i=0;i<arr.length;i++){
        const x=arr[i], y=arr[(i+1)%arr.length];
        let diff=y.baseAngle-x.baseAngle + (i===arr.length-1?2*Math.PI:0);
        const need=(Math.min(x.tr,cap)+Math.min(y.tr,cap)+gap)/R;
        if(diff<need){ const push=(need-diff)/2; x.baseAngle-=push; y.baseAngle+=push; }
      }
    }
  }

  // cadrage : vue d'ensemble aérée, centrée, jamais minuscule
  const maxR=maxDepth*ringGap; maxOrbit=maxR;
  fitZoom=Math.min(1.05, (Math.min(W,H)*0.52)/maxR);
  fitPanX=cx-cx*fitZoom; fitPanY=cy-cy*fitZoom;
  if(!autoFitted){ zoom=fitZoom; panX=fitPanX; panY=fitPanY; autoFitted=true; }
}

function update(dt,t){
  for(const n of [...nodes.values()]){
    if(n.dying){ n.dying+=dt*1.6; if(n.dying>=1){ nodes.delete(n.id); continue; } }
    n.alpha+=((n.dying?0:1)-n.alpha)*0.12;
    n.r+=(n.tr-n.r)*0.1;
    if(n.baseAngle!=null){
      const ang=n.baseAngle + t*ORBIT;                 // tout orbite autour de l'étoile
      const tx=W/2+Math.cos(ang)*n.orbitR, ty=H/2+Math.sin(ang)*n.orbitR;
      n.x+=(tx-n.x)*0.12; n.y+=(ty-n.y)*0.12;
    }
  }
}

// une cellule : halo, cytoplasme translucide à membrane ondulante,
// cils (threads) et noyau qui chauffe avec le CPU.
function cellOutline(n,r,t){
  const steps=26; ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const ang=i/steps*6.2832;
    const w=1 + 0.05*Math.sin(3*ang+t*1.1+n.id) + 0.03*Math.sin(5*ang-t*0.7+n.id*1.7);
    const rr=r*w, x=n.x+Math.cos(ang)*rr, y=n.y+Math.sin(ang)*rr;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  }
  ctx.closePath();
}
// Silhouette propre à chaque espèce (simulation) : l'herbivore est une cellule
// ronde, l'éclaireur une goutte fuselée orientée dans le sens de l'orbite, le
// prédateur une étoile hérissée qui tourne. En observation (ou pour un groupe),
// on garde la cellule ronde. Le chemin est laissé prêt à remplir/tracer.
function bodyPath(n,r,t){
  const cx=n.x, cy=n.y;
  if(mode==='simulation' && !n.isGroup){
    if(n.name==='Explorer'){                    // goutte fuselée, nez en avant
      const head=Math.atan2(cy-H/2,cx-W/2)+Math.PI/2;   // tangente de l'orbite
      const ux=Math.cos(head),uy=Math.sin(head),px=-uy,py=ux;
      ctx.beginPath();
      ctx.moveTo(cx+ux*r*1.8, cy+uy*r*1.8);
      ctx.quadraticCurveTo(cx+px*r*0.95, cy+py*r*0.95, cx-ux*r*0.95, cy-uy*r*0.95);
      ctx.quadraticCurveTo(cx-px*r*0.95, cy-py*r*0.95, cx+ux*r*1.8, cy+uy*r*1.8);
      ctx.closePath(); return r*1.8;
    }
    if(n.name==='Predator'){                    // étoile hérissée, lente rotation
      const spikes=7, rot=t*0.5+n.id;
      ctx.beginPath();
      for(let i=0;i<=spikes*2;i++){
        const ang=rot+i*Math.PI/spikes, rr=(i%2===0)?r*1.55:r*0.58;
        const x=cx+Math.cos(ang)*rr, y=cy+Math.sin(ang)*rr;
        i?ctx.lineTo(x,y):ctx.moveTo(x,y);
      }
      ctx.closePath(); return r*1.55;
    }
  }
  cellOutline(n,r,t); return r;                  // Grazer / groupes / observation
}
function drawCell(n,t,a){
  const col=nodeColor(n);
  const cpuF=Math.min((n.cpu||0)/100,2)/2;                 // 0..1
  const pulse=1 + (0.03+cpuF*0.09)*Math.sin(t*(2+cpuF*4)+n.id);
  const r=n.r*pulse;

  // LOD : les toutes petites cellules (threads noyau, RSS ~0) = simple point
  if(r<7 && !n.isGroup){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*2.8);
    g.addColorStop(0,hexA(mix(col,'#ffffff',0.4),(0.7+cpuF*0.3)*a)); g.addColorStop(1,hexA(col,0));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,r*2.8,0,7); ctx.fill();
    ctx.fillStyle=hexA(mix(col,'#ffffff',0.3),0.9*a);
    ctx.beginPath(); ctx.arc(n.x,n.y,Math.max(1.3,r*0.8),0,7); ctx.fill();
    ctx.restore(); return;
  }

  // couronne / halo
  const gr=r*(1.7+cpuF*1.6);
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const halo=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,gr);
  halo.addColorStop(0,hexA(col,(0.24+cpuF*0.45)*a));
  halo.addColorStop(0.5,hexA(col,(0.08+cpuF*0.2)*a));
  halo.addColorStop(1,hexA(col,0));
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(n.x,n.y,gr,0,7); ctx.fill();
  ctx.restore();

  // corps : silhouette d'espèce, remplie d'un dégradé à lumière décalée (relief)
  const rOut=bodyPath(n,r,t);                   // trace le chemin, renvoie l'extension max
  const body=ctx.createRadialGradient(n.x-r*0.35,n.y-r*0.35,r*0.1,n.x,n.y,rOut);
  body.addColorStop(0,hexA(mix(col,'#ffffff',0.6),a));
  body.addColorStop(0.55,hexA(col,a));
  body.addColorStop(1,hexA(mix(col,'#01040a',0.55),a));
  ctx.fillStyle=body; ctx.fill();
  // liseré : détache la silhouette du fond
  ctx.strokeStyle=hexA(mix(col,'#ffffff',0.5),0.4*a); ctx.lineWidth=1; ctx.stroke();

  // astre actif (CPU élevé) = étoile : cœur incandescent
  if(cpuF>0.04){
    const hot=mix('#ffffff','#ffcf7a',cpuF*0.6);
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const hg=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*1.35);
    hg.addColorStop(0,hexA(hot,(0.5+cpuF*0.5)*a)); hg.addColorStop(1,hexA(hot,0));
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(n.x,n.y,r*1.35,0,7); ctx.fill();
    ctx.restore();
  }

  // colonie repliée = amas (anneau pointillé)
  if(n.isGroup){
    ctx.save(); ctx.setLineDash([4,5]); ctx.strokeStyle=hexA(col,0.5*a); ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(n.x,n.y,r*1.32,0,7); ctx.stroke(); ctx.restore();
  }
}

// branche radiale : courbe qui part du parent le long de l'angle de l'enfant
function drawBranch(a,b,style,w){
  const cx=W/2, cy=H/2;
  const par=(a.depth||1)<=(b.depth||1)?a:b, chi=par===a?b:a;
  const rp=Math.hypot(par.x-cx,par.y-cy), ang=Math.atan2(chi.y-cy,chi.x-cx);
  ctx.beginPath(); ctx.moveTo(par.x,par.y);
  ctx.quadraticCurveTo(cx+Math.cos(ang)*rp, cy+Math.sin(ang)*rp, chi.x,chi.y);
  ctx.strokeStyle=style; ctx.lineWidth=w; ctx.stroke();
}

// ---------- rendu ----------
// ---------- ambiance spatiale ----------
const ORBIT=0.02;   // vitesse de rotation orbitale (rad/s)
const stars=[...Array(280)].map(()=>({x:Math.random(),y:Math.random(),
  s:Math.random()*1.4+0.3, p:Math.random()*6.28, tw:Math.random()*2+0.4}));
function drawStars(t){ ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const st of stars){ const a=(0.35+0.45*Math.sin(t*st.tw+st.p))*0.7;
    ctx.fillStyle=`rgba(205,218,245,${Math.max(0,a)})`;
    ctx.beginPath(); ctx.arc(st.x*W,st.y*H,st.s,0,7); ctx.fill(); }
  ctx.restore(); }
function drawNebula(){ ctx.save(); ctx.globalCompositeOperation='lighter';
  const n1=ctx.createRadialGradient(W*0.76,H*0.22,0,W*0.76,H*0.22,W*0.5);
  n1.addColorStop(0,'rgba(96,70,170,.1)'); n1.addColorStop(1,'rgba(96,70,170,0)');
  ctx.fillStyle=n1; ctx.fillRect(0,0,W,H);
  const n2=ctx.createRadialGradient(W*0.18,H*0.82,0,W*0.18,H*0.82,W*0.46);
  n2.addColorStop(0,'rgba(34,130,150,.09)'); n2.addColorStop(1,'rgba(34,130,150,0)');
  ctx.fillStyle=n2; ctx.fillRect(0,0,W,H); ctx.restore(); }

let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now; const t=now/1000;
  update(dt,t);
  ctx.clearRect(0,0,W,H);
  // fond
  // fond spatial : nuit profonde, nébuleuses, champ d'étoiles
  const sp=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
  sp.addColorStop(0,'#0a0f1e'); sp.addColorStop(1,'#03040a');
  ctx.fillStyle=sp; ctx.fillRect(0,0,W,H);
  drawNebula(); drawStars(t);

  ctx.save(); ctx.translate(panX,panY); ctx.scale(zoom,zoom);   // caméra
  // cœur du système au centre (racine de l'arbre) + anneaux de profondeur
  if(nodes.size){
    // orbites (les anneaux de profondeur)
    for(let d=1; d*ringGap<maxOrbit*1.15; d++){
      ctx.beginPath(); ctx.arc(W/2,H/2,d*ringGap,0,7);
      ctx.strokeStyle='rgba(130,160,210,.06)'; ctx.lineWidth=1; ctx.stroke();
    }
    // étoile centrale = racine du système
    const R0=30+4*Math.sin(t*1.6);
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const star=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,R0*2.6);
    star.addColorStop(0,'rgba(255,246,220,.95)');
    star.addColorStop(0.28,'rgba(255,208,138,.5)');
    star.addColorStop(1,'rgba(255,176,90,0)');
    ctx.fillStyle=star; ctx.beginPath(); ctx.arc(W/2,H/2,R0*2.6,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,251,238,.95)'; ctx.beginPath(); ctx.arc(W/2,H/2,R0*0.5,0,7); ctx.fill();
    ctx.restore();
  }

  const lin = sel!=null ? lineageSet(sel) : null;
  const q=query.trim().toLowerCase();
  const isLit=n=> (!lin||lin.has(n.id)) && (!q||n.name.toLowerCase().includes(q));

  // branches de base : veines bioluminescentes toujours visibles, teintées par
  // l'état des deux processus qu'elles relient (rendu additif -> réseau vivant)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const e of edges){
    const a=nodes.get(e.from), b=nodes.get(e.to); if(!a||!b) continue;
    if(lin && lin.has(a.id) && lin.has(b.id)) continue;   // lignée : dessinée par-dessus
    const base = lin ? 0.10 : 0.34;                       // reste esquissé même hors lignée
    const shimmer = base * (0.85 + 0.15*Math.sin(t*1.4 + a.id));
    const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, hexA(nodeColor(a), shimmer));
    grad.addColorStop(0.5, hexA(mix(nodeColor(a), nodeColor(b), 0.5), shimmer*0.7));
    grad.addColorStop(1, hexA(nodeColor(b), shimmer));
    drawBranch(a, b, grad, 1.3);
  }
  ctx.restore();

  // sève : de fins pulses glissent du parent vers l'enfant le long des veines
  ctx.save(); ctx.globalCompositeOperation='lighter';
  {
    const CX=W/2, CY=H/2;
    for(const e of edges){
      const a=nodes.get(e.from), b=nodes.get(e.to); if(!a||!b) continue;
      const litEdge = lin && lin.has(a.id) && lin.has(b.id);
      if(lin && !litEdge) continue;
      const par=(a.depth||1)<=(b.depth||1)?a:b, chi=par===a?b:a;
      const rp=Math.hypot(par.x-CX,par.y-CY), ang=Math.atan2(chi.y-CY,chi.x-CX);
      const kx=CX+Math.cos(ang)*rp, ky=CY+Math.sin(ang)*rp;
      const u=(t*0.32 + e.from*0.013) % 1, mt=1-u;
      const px=mt*mt*par.x+2*mt*u*kx+u*u*chi.x;
      const py=mt*mt*par.y+2*mt*u*ky+u*u*chi.y;
      const col=litEdge?'#9ffbe8':nodeColor(chi);
      ctx.fillStyle=hexA(col, litEdge?0.9:0.3);
      ctx.beginPath(); ctx.arc(px,py, litEdge?2.2:1.3, 0,7); ctx.fill();
    }
  }
  ctx.restore();

  // fratries homonymes : on ne veut qu'UNE étiquette « nom ×N » par groupe
  const gCount=new Map(), gRep=new Map();
  for(const n of nodes.values()){
    if(n.dying) continue; const p=parentOf.get(n.id); if(p==null) continue;
    const key=p+'|'+n.name; gCount.set(key,(gCount.get(key)||0)+1);
    if(!gRep.has(key)) gRep.set(key,n.id);
  }

  // nœuds = cellules
  for(const n of nodes.values()){
    const lit=isLit(n); const a=n.alpha*(lit?1:0.14);
    if(a<=0.01) continue;
    drawCell(n,t,a);
    const r=n.r;
    if(n.id===sel||n.id===hover){
      ctx.strokeStyle=hexA('#57f2d6',0.9); ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(n.x,n.y,r+6,0,7); ctx.stroke();
    }
    // étiquette (dé-dupliquée par fratrie)
    let label=n.name, showLabel;
    if(n.isGroup){ label=`${n.name} ×${n.count}`; showLabel=r>10; }
    else {
      const p=parentOf.get(n.id), key=p!=null?p+'|'+n.name:null;
      const gc=key?gCount.get(key):1, grouped=gc>=6;
      showLabel=(n.id===sel||n.id===hover)||(r>14&&(!grouped||gRep.get(key)===n.id));
      if(grouped && n.id!==sel && n.id!==hover) label=`${n.name} ×${gc}`;
    }
    if(showLabel){
      ctx.font='11px "IBM Plex Mono",monospace'; ctx.textAlign='center';
      ctx.fillStyle=hexA('#e8f0f8',Math.min(1,a+0.2));
      ctx.fillText(label, n.x, n.y+r+15);
    }
  }

  // branches de lignée (par-dessus les nœuds) : fils bioluminescents cyan
  if(lin){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.shadowColor='#57f2d6'; ctx.shadowBlur=11;
    for(const e of edges){
      const a=nodes.get(e.from), b=nodes.get(e.to); if(!a||!b) continue;
      if(!(lin.has(a.id)&&lin.has(b.id))) continue;
      drawBranch(a,b,'rgba(87,242,214,.9)',2.2);
    }
    ctx.restore();
  }

  ctx.restore();   // fin caméra

  // vignette d'ambiance : le vide se referme sur les bords
  const vg=ctx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.34,W/2,H*0.46,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(1,7,11,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// helpers couleur
function hexA(hex,a){ const h=hex.replace('#',''); const r=parseInt(h.substr(0,2),16),
  g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a))})`; }
function mix(h1,h2,t){ const p=x=>[parseInt(x.substr(1,2),16),parseInt(x.substr(3,2),16),parseInt(x.substr(5,2),16)];
  const a=p(h1),b=p(h2); const c=a.map((v,i)=>Math.round(v+(b[i]-v)*t));
  return '#'+c.map(v=>v.toString(16).padStart(2,'0')).join(''); }

// ---------- interaction ----------
function nodeAt(px,py){ let best=null,bd=1e9;
  for(const n of nodes.values()){ if(n.dying) continue; const d=Math.hypot(n.x-px,n.y-py);
    if(d<n.r+6 && d<bd){ bd=d; best=n; } } return best; }
const tip=document.getElementById('tip');
function screenToWorld(sx,sy){ return [(sx-panX)/zoom,(sy-panY)/zoom]; }
let isDown=false, dragged=false, panLastX=0, panLastY=0;

cv.addEventListener('mousedown',e=>{ isDown=true; dragged=false; panLastX=e.clientX; panLastY=e.clientY; });
window.addEventListener('mouseup',()=>{ isDown=false; });
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  if(isDown){ const dx=e.clientX-panLastX, dy=e.clientY-panLastY;
    if(dragged||Math.abs(dx)+Math.abs(dy)>3){ dragged=true; panX+=dx; panY+=dy; }
    panLastX=e.clientX; panLastY=e.clientY; }
  const [wx,wy]=screenToWorld(e.clientX-r.left,e.clientY-r.top);
  const n=nodeAt(wx,wy); hover=n?n.id:null;
  if(n && !isDown){ tip.style.display='block'; tip.style.left=(e.clientX-r.left+14)+'px';
    tip.style.top=(e.clientY-r.top+10)+'px';
    tip.textContent = n.isGroup ? `${n.name} ×${n.count} · ${fmtMem(n.mem)} · click to expand`
                                : `${n.name} · ${fmtMem(n.mem)} · ${Math.round(n.cpu)}%`;
    cv.style.cursor='pointer'; }
  else { tip.style.display='none'; cv.style.cursor=isDown?'grabbing':(n?'pointer':'grab'); } });
cv.addEventListener('mouseleave',()=>{hover=null;tip.style.display='none';});
cv.addEventListener('click',e=>{
  if(dragged) return;   // on vient de déplacer la vue, pas de sélection
  const r=cv.getBoundingClientRect();
  const [wx,wy]=screenToWorld(e.clientX-r.left,e.clientY-r.top);
  const n=nodeAt(wx,wy);
  if(n && n.isGroup) toggleGroup(n.groupKey);
  else select(n?n.id:null); });
cv.addEventListener('wheel',e=>{ e.preventDefault();
  const r=cv.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const nz=Math.min(7,Math.max(0.35, zoom*Math.exp(-e.deltaY*0.0016)));
  panX=mx-((mx-panX)/zoom)*nz; panY=my-((my-panY)/zoom)*nz; zoom=nz;
},{passive:false});
cv.addEventListener('dblclick',()=>{ zoom=fitZoom; panX=fitPanX; panY=fitPanY; });

function select(id){
  // sélectionner un process replié déplie son groupe pour le révéler
  if(id!=null && !nodes.has(id) && pidToGroupKey.has(id)){
    expanded.add(pidToGroupKey.get(id)); buildDisplay(); computeLayout();
    document.getElementById('regroup').style.display='block';
  }
  sel=id; renderList(); renderCard();
}
document.getElementById('cClose').onclick=()=>select(null);
document.getElementById('regroup').onclick=()=>{
  expanded.clear(); buildDisplay(); computeLayout();
  document.getElementById('regroup').style.display='none';
};

function kv(k,v){ return `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`; }
function renderCard(){
  const card=document.getElementById('card');
  if(sel==null || !nodes.get(sel)){ card.style.display='none'; return; }
  const n=nodes.get(sel);
  document.getElementById('cName').textContent=n.name;
  const parent=nodes.get(n.ppid);
  const kids=(childrenOf.get(n.id)||[]).length;
  document.getElementById('cBody').innerHTML=
      kv(mode==='observation'?'pid':'id', n.id)
    + (mode==='observation'?kv('parent', parent?`${parent.name} · ${n.ppid}`:n.ppid):'')
    + (mode==='observation'?kv('state', n.state):kv('species', n.name)+kv('biome', n.state))
    + kv('memory', fmtMem(n.mem))
    + (mode==='observation'?kv('cpu', n.cpu.toFixed(1)+' %'):kv('energy',n.mem.toFixed(1)))
    + (mode==='observation'?kv('threads', n.threads):'')
    + kv('children', kids)
    + (mode==='observation'?`<div class="cmd">${escapeHtml(n.cmd)}</div>`:'');
  const act=document.getElementById('cAct');
  if(canKill && mode==='observation'){
    act.innerHTML=`<button id="kill">terminate</button>`;
    const btn=document.getElementById('kill'); let armed=false, timer=null;
    btn.onclick=()=>{
      if(!armed){ armed=true; btn.classList.add('confirm'); btn.textContent='confirm — send SIGTERM';
        timer=setTimeout(()=>{armed=false;btn.classList.remove('confirm');btn.textContent='terminate';},3000); return; }
      clearTimeout(timer);
      fetch('/kill?pid='+n.id,{method:'POST'}).catch(()=>{});
      btn.textContent='signal sent'; btn.classList.remove('confirm');
    };
  } else act.innerHTML='';
  card.style.display='block';
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
setInterval(()=>{ if(sel!=null) renderCard(); },1000);
</script>
