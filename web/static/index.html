<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ecosys — god view</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05070d;
               font-family: "Segoe UI", system-ui, sans-serif; color: #cfd8e3; }
  canvas { display: block; }
  #hud { position: fixed; top: 0; left: 0; right: 0; padding: 10px 16px;
         display: flex; align-items: baseline; gap: 18px; pointer-events: none;
         text-shadow: 0 1px 4px #000; z-index: 5; }
  #hud .title { font-size: 20px; font-weight: 600; color: #8ee6a1; }
  #hud .stat { font-size: 13px; opacity: .8; }
  #hud .mode { font-size: 11px; padding: 2px 8px; border: 1px solid #3a4a5f;
               border-radius: 10px; letter-spacing: .08em; text-transform: uppercase; }
  #feed { position: fixed; left: 14px; bottom: 12px; font-size: 12.5px;
          pointer-events: none; z-index: 5; }
  #feed div { margin-top: 3px; text-shadow: 0 1px 3px #000; transition: opacity .6s; }
  #panel { position: fixed; right: 14px; top: 52px; width: 230px; display: none;
           background: rgba(10,14,22,.88); border: 1px solid #2b3950;
           border-radius: 10px; padding: 12px 14px; font-size: 13px;
           backdrop-filter: blur(4px); z-index: 6; }
  #panel h3 { margin: 0 0 6px; font-size: 14px; color: #8ee6a1; }
  #panel .row { display: flex; justify-content: space-between; margin: 3px 0; }
  #panel .row span:first-child { opacity: .6; }
  #panel .close { position: absolute; top: 6px; right: 10px; cursor: pointer; opacity: .5; }
  #tip { position: fixed; display: none; padding: 3px 8px; font-size: 12px;
         background: rgba(10,14,22,.9); border: 1px solid #2b3950;
         border-radius: 6px; pointer-events: none; z-index: 6; }
  #hint { position: fixed; right: 14px; bottom: 12px; font-size: 11px; opacity: .4;
          pointer-events: none; z-index: 5; }
</style>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
</head>
<body>
<div id="hud">
  <span class="title">ECOSYS 🌱</span>
  <span class="mode" id="mode">…</span>
  <span class="stat" id="tick"></span>
  <span class="stat" id="pop"></span>
</div>
<div id="feed"></div>
<div id="panel"><span class="close" id="panelClose">✕</span><div id="panelBody"></div></div>
<div id="tip"></div>
<div id="hint">drag to orbit · scroll to zoom · click a creature</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/controls/OrbitControls.js';

const R = 10;                         // rayon de la planète
const SURFACE = R + 0.35;             // hauteur des créatures

// ---------- scène ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 7, 25);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.45;
controls.minDistance = 14;
controls.maxDistance = 60;

scene.add(new THREE.AmbientLight(0x5a6678, 1.3));
const sun = new THREE.DirectionalLight(0xfff2e0, 1.1);
sun.position.set(1, 0.8, 0.6);
scene.add(sun);

// planète + halo atmosphérique
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(R, 64, 64),
  new THREE.MeshStandardMaterial({ color: 0x0a1a2b, emissive: 0x03080f, roughness: 1, metalness: 0 })));
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(R * 1.06, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0x2a6cff, transparent: true, opacity: 0.06,
                                side: THREE.BackSide })));

// étoiles
{
  const g = new THREE.BufferGeometry();
  const n = 1400, arr = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(120 + Math.random() * 120);
    arr.set([v.x, v.y, v.z], i * 3);
  }
  g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x9fb4d8, size: 0.5 })));
}

// lignes de relations (buffers préalloués, mis à jour chaque frame)
function makeLineSet(material, maxVerts) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(maxVerts * 3);
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const line = new THREE.LineSegments(geo, material);
  line.frustumCulled = false;
  scene.add(line);
  return { geo, pos, line };
}
const lineage = makeLineSet(new THREE.LineBasicMaterial({ color: 0x6fe89a, transparent: true, opacity: 0.5 }), 6000);
const rivalry = makeLineSet(new THREE.LineBasicMaterial({ color: 0xe0684a, transparent: true, opacity: 0.22 }), 6000);

// ---------- utilitaires géométrie sur la sphère ----------
function hashStr(s) { let h = 2166136261; for (const c of String(s)) { h ^= c.codePointAt(0); h = Math.imul(h, 16777619); } return h >>> 0; }
function fibAnchor(i, n) {
  const y = 1 - 2 * (i + 0.5) / n, r = Math.sqrt(Math.max(0, 1 - y * y));
  const th = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
  return new THREE.Vector3(Math.cos(th) * r, y, Math.sin(th) * r);
}
function tangentBasis(a) {
  const up = Math.abs(a.y) > 0.99 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
  const t1 = new THREE.Vector3().crossVectors(up, a).normalize();
  const t2 = new THREE.Vector3().crossVectors(a, t1).normalize();
  return [t1, t2];
}
function surfaceDir(anchor, u, v) {
  const [t1, t2] = tangentBasis(anchor);
  return anchor.clone().addScaledVector(t1, u).addScaledVector(t2, v).normalize();
}

// ---------- état ----------
const zones = new Map();      // name -> {anchor,hue,disc,label,targetR}
const creatures = new Map();  // id -> creature
let relations = [];
let mode = '…', tick = 0, population = 0, lastSeq = 0;
let selection = null, framed = false;
const feedEl = document.getElementById('feed');

function makeLabel(text) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const g = c.getContext('2d');
  g.font = '600 30px system-ui'; g.textAlign = 'center';
  g.fillStyle = 'rgba(225,235,245,.9)'; g.fillText(text, 128, 42);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c),
    transparent: true, depthTest: false, depthWrite: false }));
  s.scale.set(5, 1.25, 1);
  return s;
}

function layoutZones(names) {
  names.sort();
  // suppression des zones disparues
  for (const name of [...zones.keys()]) {
    if (!names.includes(name)) {
      const z = zones.get(name); scene.remove(z.disc); scene.remove(z.label); zones.delete(name);
    }
  }
  names.forEach((name, i) => {
    let z = zones.get(name);
    const anchor = fibAnchor(i, Math.max(names.length, 3));
    const hue = (i * 137.5 + 90) % 360;
    if (!z) {
      const color = new THREE.Color().setHSL(hue / 360, 0.6, 0.5);
      const disc = new THREE.Mesh(new THREE.CircleGeometry(2, 40),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.38,
          side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false }));
      const label = makeLabel(name);
      scene.add(disc); scene.add(label);
      z = { anchor, hue, disc, label, targetR: 2 };
      zones.set(name, z);
    }
    z.anchor = anchor; z.hue = hue;
    z.disc.position.copy(anchor).multiplyScalar(R + 0.06);
    z.disc.lookAt(z.disc.position.clone().multiplyScalar(2));
    z.label.position.copy(anchor).multiplyScalar(R + 2.4);
  });
}

function zoneAnchor(name) { const z = zones.get(name); return z ? z.anchor : new THREE.Vector3(0, 1, 0); }

function spawnCreature(o) {
  const rnd = mulberry(hashStr(o.id + 'x'));
  const cap = 0.22;
  const offset = { u: (rnd() - .5) * cap, v: (rnd() - .5) * cap };
  const hue = hashStr(o.name) % 360;
  const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.34, 0),
    new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(hue / 360, 0.7, 0.6),
      emissive: new THREE.Color().setHSL(hue / 360, 0.85, 0.5), emissiveIntensity: 0.6, roughness: 0.4 }));
  mesh.userData.id = o.id;
  const dir = surfaceDir(zoneAnchor(o.zone), offset.u, offset.v);
  mesh.position.copy(dir).multiplyScalar(SURFACE);
  scene.add(mesh);
  return { id: o.id, name: o.name, zone: o.zone, energy: o.energy, max: o.max,
           mesh, dir, offset, rnd, wander: 0, wu: offset.u, wv: offset.v, scale: 0, dying: 0 };
}
function mulberry(a) { return () => { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }

// ---------- synchro serveur ----------
async function poll() {
  try {
    const s = await (await fetch('/state')).json();
    if (!s.zones) return;
    mode = s.mode; tick = s.tick; population = s.population; relations = s.relations || [];

    layoutZones(s.zones.map(z => z.name));
    for (const zv of s.zones) { const z = zones.get(zv.name); if (z) z.yield = zv.yield; }

    const alive = new Set();
    for (const o of s.organisms) {
      alive.add(o.id);
      let c = creatures.get(o.id);
      if (!c) { creatures.set(o.id, spawnCreature(o)); continue; }
      c.zone = o.zone; c.energy = o.energy; c.max = o.max; c.dying = 0;
    }
    for (const c of creatures.values()) if (!alive.has(c.id) && !c.dying) c.dying = 0.0001;

    let best = null, bestN = -1;
    for (const z of zones.values()) {
      let n = 0; for (const c of creatures.values()) if (c.zone === z.name && !c.dying) n++;
      z.targetR = 1.4 + Math.sqrt(n) * 0.7;
      if (n > bestN) { bestN = n; best = z; }
    }
    // À la première donnée, on ouvre la vue face au continent le plus peuplé.
    if (!framed && best) {
      framed = true;
      const d = camera.position.length();
      camera.position.copy(best.anchor).multiplyScalar(d);
      controls.update();
    }

    for (const e of s.events) {
      if (e.seq <= lastSeq) continue; lastSeq = e.seq;
      const icons = { born: '🌱', reproduced: '🐣', thrived: '✨', migrated: '🧭', competed: '⚔️', died: '💀', starved: '💀' };
      const colors = { born: '#7be08a', reproduced: '#7be08a', thrived: '#b8f0c0', migrated: '#7cd6e6', competed: '#e6cf7c', died: '#e07b7b', starved: '#e07b7b' };
      const div = document.createElement('div');
      div.textContent = (icons[e.type] || '·') + ' ' + e.text;
      div.style.color = colors[e.type] || '#cfd8e3';
      feedEl.appendChild(div);
      while (feedEl.children.length > 7) feedEl.removeChild(feedEl.firstChild);
      [...feedEl.children].forEach((el, i, all) => el.style.opacity = 0.35 + 0.65 * (i + 1) / all.length);
    }

    document.getElementById('mode').textContent = mode;
    document.getElementById('tick').textContent = 'tick ' + tick;
    document.getElementById('pop').textContent = 'population ' + population;
  } catch (err) { /* serveur pas prêt */ }
}
setInterval(poll, 500); poll();

// ---------- rendu ----------
function updateArcs(dt) {
  let li = 0, ri = 0;
  const tmpA = new THREE.Vector3(), tmpB = new THREE.Vector3(), ctrl = new THREE.Vector3(), p = new THREE.Vector3();
  const K = 12;
  for (const r of relations) {
    const a = creatures.get(r.from), b = creatures.get(r.to);
    if (!a || !b || a.dying || b.dying) continue;
    const lineageRel = r.type === 'lineage';
    tmpA.copy(a.mesh.position); tmpB.copy(b.mesh.position);
    ctrl.addVectors(tmpA, tmpB).multiplyScalar(0.5).normalize()
        .multiplyScalar(R + (lineageRel ? 2.6 : 0.9));
    const target = lineageRel ? lineage : rivalry;
    let prev = null;
    for (let k = 0; k <= K; k++) {
      const t = k / K, mt = 1 - t;
      p.set(
        mt * mt * tmpA.x + 2 * mt * t * ctrl.x + t * t * tmpB.x,
        mt * mt * tmpA.y + 2 * mt * t * ctrl.y + t * t * tmpB.y,
        mt * mt * tmpA.z + 2 * mt * t * ctrl.z + t * t * tmpB.z);
      if (prev) {
        const idx = (lineageRel ? li : ri);
        target.pos.set([prev.x, prev.y, prev.z, p.x, p.y, p.z], idx * 3);
        if (lineageRel) li += 2; else ri += 2;
      }
      prev = p.clone();
    }
  }
  lineage.geo.setDrawRange(0, li); lineage.geo.attributes.position.needsUpdate = true;
  rivalry.geo.setDrawRange(0, ri); rivalry.geo.attributes.position.needsUpdate = true;
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta()), t = clock.elapsedTime;

  for (const z of zones.values()) {
    const s = z.disc.scale.x + (z.targetR - z.disc.scale.x) * 0.05;
    z.disc.scale.set(s, s, s);
  }

  for (const [id, c] of creatures) {
    // errance douce dans la zone + glissement vers la zone courante (migration)
    c.wander -= dt;
    if (c.wander <= 0) { c.wu = (c.rnd() - .5) * 0.28; c.wv = (c.rnd() - .5) * 0.28; c.wander = 2 + c.rnd() * 3; }
    c.offset.u += (c.wu - c.offset.u) * 0.02;
    c.offset.v += (c.wv - c.offset.v) * 0.02;
    const desired = surfaceDir(zoneAnchor(c.zone), c.offset.u, c.offset.v);
    c.dir.lerp(desired, 0.08).normalize();
    c.mesh.position.copy(c.dir).multiplyScalar(SURFACE);

    const ratio = Math.max(0.05, Math.min(1, c.energy / (c.max || 1)));
    if (c.dying) { c.dying += dt * 1.3; if (c.dying >= 1) { scene.remove(c.mesh); c.mesh.geometry.dispose(); c.mesh.material.dispose(); creatures.delete(id); continue; } }
    c.scale += (1 - c.scale) * 0.1;
    const pulse = 1 + 0.08 * Math.sin(t * 3 + id);
    const sc = (0.5 + 0.9 * ratio) * c.scale * (1 - (c.dying || 0)) * pulse;
    c.mesh.scale.setScalar(sc);
    c.mesh.material.emissiveIntensity = 0.3 + 0.9 * ratio;
    c.mesh.visible = sc > 0.02;
  }

  updateArcs(dt);
  controls.update();
  renderer.render(scene, camera);
  updateTooltip();
}
requestAnimationFrame(animate);   // 1er frame après init complète du module (évite la TDZ)

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- inspection ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hovered = null, hasPointer = false;
const tip = document.getElementById('tip');
renderer.domElement.addEventListener('pointermove', e => {
  hasPointer = true;
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  tip.dataset.x = e.clientX; tip.dataset.y = e.clientY;
});
function pickCreature() {
  raycaster.setFromCamera(pointer, camera);
  const meshes = [...creatures.values()].filter(c => !c.dying).map(c => c.mesh);
  const hit = raycaster.intersectObjects(meshes, false)[0];
  return hit ? creatures.get(hit.object.userData.id) : null;
}
function updateTooltip() {
  if (!hasPointer) return;
  hovered = pickCreature();
  if (hovered) {
    tip.style.display = 'block';
    tip.style.left = (+tip.dataset.x + 12) + 'px'; tip.style.top = (+tip.dataset.y + 8) + 'px';
    tip.textContent = `${hovered.name} · ${Math.round(hovered.energy * 10) / 10}`;
    renderer.domElement.style.cursor = 'pointer';
  } else { tip.style.display = 'none'; renderer.domElement.style.cursor = 'grab'; }
}
renderer.domElement.addEventListener('click', () => {
  const c = pickCreature();
  selection = c ? { kind: 'creature', key: c.id } : null;
});

const panel = document.getElementById('panel'), panelBody = document.getElementById('panelBody');
document.getElementById('panelClose').onclick = () => { selection = null; };
function row(k, v) { return `<div class="row"><span>${k}</span><span>${v}</span></div>`; }
setInterval(() => {
  if (!selection) { panel.style.display = 'none'; return; }
  const c = creatures.get(selection.key);
  if (!c) { selection = null; return; }
  const parentRel = relations.find(r => r.type === 'lineage' && r.to === c.id);
  const parent = parentRel ? creatures.get(parentRel.from) : null;
  const children = relations.filter(r => r.type === 'lineage' && r.from === c.id).length;
  const rivals = relations.filter(r => r.type === 'competition' && (r.from === c.id || r.to === c.id)).length;
  panelBody.innerHTML = `<h3>${c.name}</h3>`
    + row(mode === 'observation' ? 'pid' : 'id', c.id)
    + row('zone', c.zone)
    + row('energy', Math.round(c.energy * 100) / 100 + (mode === 'observation' ? ' MiB' : ''))
    + (mode === 'simulation' ? row('repro. at', c.max) : '')
    + (parent ? row('parent', parent.name + ' #' + parent.id) : '')
    + (children ? row('children', children) : '')
    + (rivals ? row('rivals', rivals) : '');
  panel.style.display = 'block';
}, 200);
</script>
</body>
</html>
